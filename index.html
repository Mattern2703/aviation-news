<!DOCTYPE html>
<html>
<head>
  <title>Aviation News</title>
</head>
<body><body style="font-family: Arial; background:#111; color:white;">

<h1 style="text-align:center;">🛫 Aviation News</h1>

<div id="news" style="max-width:800px; margin:auto;"></div>

</body>
<h2>Mine artikler</h2>

<div>
  <h3>Norwegian åpner ny rute</h3>
  <p>Jeg mener dette er en viktig utvikling for norsk luftfart...</p>
</div>
<h1>🛫 Aviation News</h1>
<div id="news"></div>

<script>
fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.flightglobal.com/rss")
  .then(res => res.json())
  .then(data => {
    const news = document.getElementById("news");

    data.items.slice(0, 5).forEach(article => {
      news.innerHTML += `
        <h3>${article.title}</h3>
        <a href="${article.link}" target="_blank">Les mer</a>
        <hr>
      `;
    });
  });
</script>

</body>
</html>
